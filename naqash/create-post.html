<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post - Naqash</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="site-header">
      <div class="header-shell">
        <button class="menu-toggle">☰</button>

        <a href="homepage.html" class="nav-brand">Naqash</a>

        <!-- SEARCH -->
        <form action="search.html" method="GET" class="search-form">
          <input
            type="search"
            name="query"
            class="search-bar"
            placeholder="Search Naqash..."
            required
          />
        </form>

        <div class="nav-links">
          <a href="login.html" class="btn btn-outline">Login</a>
          <a href="register.html" class="btn btn-primary">Register</a>
        </div>
      </div>
    </header>

    <!-- BACK BUTTON -->
    <div class="page-topbar">
      <a href="homepage.html" class="back-btn">← Back to Home</a>
    </div>

    <div class="page-layout">
      <!-- SIDEBAR -->
      <aside class="main-sidebar" id="sidebar">
        <nav>
          <a href="homepage.html">Home</a>
          <a href="community.html">Communities</a>
          <a href="create-post.html">Create Post</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="profile.html">Profile</a>
          <a href="search.html">Search</a>
          <a href="about.html">About</a>
        </nav>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="feed">
        <section class="card create-post-box">
          <h2>Create a Post</h2>

          <form id="create-post-form" action="homepage.html">
            <label for="community">Choose a Community:</label>
            <select id="community" class="form-input">
              <option>r/WebDev</option>
            </select>

            <label for="title">Title:</label>
            <input
              type="text"
              id="title"
              class="form-input"
              placeholder="Enter your post title"
              value=""
            />

            <div class="post-tabs" id="create-post-tabs">
              <button type="button" class="tab-btn is-active" data-target="text">Text</button>
              <button type="button" class="tab-btn" data-target="image">Image</button>
              <button type="button" class="tab-btn" data-target="video">Video</button>
              <button type="button" class="tab-btn" data-target="link">Link</button>
            </div>

            <div id="input-section-text" class="post-input-section">
              <label for="content">Content:</label>
              <textarea
                id="content"
                class="form-input"
                placeholder="Write your post..."
              ></textarea>
            </div>

            <div id="input-section-image" class="post-input-section" style="display: none;">
              <label for="image-upload">Upload Image:</label>
              <input type="file" id="image-upload" class="form-input" accept="image/*" />
            </div>

            <div id="input-section-video" class="post-input-section" style="display: none;">
              <label for="video-url">Video URL:</label>
              <input type="url" id="video-url" class="form-input" placeholder="Enter YouTube or Vimeo URL" />
            </div>

            <div id="input-section-link" class="post-input-section" style="display: none;">
              <label for="link-url">Link URL:</label>
              <input type="url" id="link-url" class="form-input" placeholder="Enter link URL" />
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Post</button>
              <a href="homepage.html" class="btn btn-outline">Cancel</a>
            </div>
          </form>
        </section>
      </main>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
      </div>
      <p>&copy; 2026 Naqash Platform</p>
    </footer>
    <script src="js/script.js"></script>
  </body>
</html>
