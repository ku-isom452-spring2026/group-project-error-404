<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post - Naqash</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <div class="header-shell">
        <a href="index.html" class="nav-brand">Naqash</a>

        <!-- SEARCH -->
        <form action="search.html" method="GET" class="search-form">
          <input
            type="search"
            name="query"
            class="search-bar"
            placeholder="Search Naqash..."
            required
          />
        </form>

        <div class="nav-links">
          <a href="login.html" class="btn btn-outline">Login</a>
          <a href="register.html" class="btn btn-primary">Register</a>
        </div>
      </div>
    </header>

    <!-- BACK BUTTON -->
    <div class="page-topbar">
      <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <!-- MAIN CONTENT -->
    <main class="feed">
      <section class="card create-post-box">
        <h2>Create a Post</h2>

        <form>
          <label for="community">Choose a Community:</label>
          <select id="community" class="form-input">
            <option>r/WebDev</option>
          </select>

          <label for="title">Title:</label>
          <input
            type="text"
            id="title"
            class="form-input"
            placeholder="Enter your post title"
            value=""
          />

          <div class="post-tabs">
            <button type="button" class="tab-btn">Text</button>
            <button type="button" class="tab-btn">Image</button>
            <button type="button" class="tab-btn">Video</button>
            <button type="button" class="tab-btn">Link</button>
          </div>

          <label for="content">Content:</label>
          <textarea
            id="content"
            class="form-input"
            placeholder="Write your post..."
          ></textarea>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Post</button>
            <a href="index.html" class="btn btn-outline">Cancel</a>
          </div>
        </form>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
      </div>
      <p>&copy; 2026 Naqash Platform</p>
    </footer>
  </body>
</html>
