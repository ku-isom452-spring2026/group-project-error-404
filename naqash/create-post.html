<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post - Naqash</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>

    <header>
      <div class="header-top">
        <a href="index.html" class="nav-brand">Naqash</a>
        <input type="text" class="search-bar" placeholder="Search..." />
        <div class="nav-links">
          <a href="login.html" class="btn btn-outline">Login</a>
          <a href="register.html" class="btn btn-primary">Register</a>
        </div>
      </div>
    </header>

    <main class="feed">

      <section class="card create-post-box">
        <h2>Create a Post</h2>

        <form>

          <!-- Community -->
          <label for="community">Choose a Community:</label>
          <select id="community" class="form-input">
            <option>r/WebDev</option>
            <option>r/Science</option>
            <option>r/Sports</option>
          </select>

          <!-- Title -->
          <label for="title">Title:</label>
          <input
            type="text"
            id="title"
            class="form-input"
            placeholder="Enter your post title"
          />

          <!-- Post Type Tabs -->
          <div class="post-tabs">
            <button type="button" class="tab-btn">Text</button>
            <button type="button" class="tab-btn">Image</button>
            <button type="button" class="tab-btn">Video</button>
            <button type="button" class="tab-btn">Link</button>
          </div>

          <!-- Content -->
          <label for="content">Content:</label>
          <textarea
            id="content"
            class="form-input"
            placeholder="Write your post..."
          ></textarea>

          <!-- Actions -->
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Submit Post</button>
            <a href="index.html" class="btn btn-outline">Cancel</a>
          </div>

        </form>

      </section>

    </main>

    <footer>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
      </div>
      <p>&copy; 2026 Naqash Platform</p>
    </footer>

  </body>
</html>
